<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" role="img" aria-label="Ilustración conceptual de un entorno de trabajo: código, señal y hardware">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1729"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <rect width="400" height="225" fill="url(#bg3)"/>

  <!-- Trazas de circuito de fondo -->
  <g stroke="#1e2b45" stroke-width="1.5" fill="none">
    <path d="M0,40 H60 V90 H120"/>
    <path d="M400,60 H340 V120 H280"/>
    <path d="M40,225 V180 H100"/>
    <path d="M360,225 V170 H300 V200"/>
  </g>
  <g fill="#1e3a5f">
    <circle cx="60" cy="40" r="3"/><circle cx="120" cy="90" r="3"/>
    <circle cx="340" cy="60" r="3"/><circle cx="280" cy="120" r="3"/>
    <circle cx="100" cy="180" r="3"/><circle cx="300" cy="170" r="3"/>
  </g>

  <!-- Ventana de código -->
  <g>
    <rect x="70" y="48" width="260" height="130" rx="12" fill="#0b1220" stroke="#1e2b45" stroke-width="1.5"/>
    <rect x="70" y="48" width="260" height="26" rx="12" fill="#111c33"/>
    <rect x="70" y="62" width="260" height="12" fill="#111c33"/>
    <circle cx="86" cy="61" r="3.5" fill="#f87171"/>
    <circle cx="100" cy="61" r="3.5" fill="#fbbf24"/>
    <circle cx="114" cy="61" r="3.5" fill="#34d399"/>
    <!-- líneas de código -->
    <g>
      <rect x="86"  y="90"  width="40"  height="6" rx="3" fill="#7dd3fc"/>
      <rect x="132" y="90"  width="70"  height="6" rx="3" fill="#334155"/>
      <rect x="98"  y="106" width="55"  height="6" rx="3" fill="#475569"/>
      <rect x="160" y="106" width="90"  height="6" rx="3" fill="#334155"/>
      <rect x="98"  y="122" width="120" height="6" rx="3" fill="#38bdf8" opacity="0.6"/>
      <rect x="86"  y="138" width="35"  height="6" rx="3" fill="#7dd3fc"/>
      <rect x="128" y="138" width="60"  height="6" rx="3" fill="#334155"/>
      <rect x="86"  y="154" width="150" height="6" rx="3" fill="#334155"/>
    </g>
  </g>

  <!-- Señal / forma de onda superpuesta -->
  <path d="M20,200 q15,-40 30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0"
        fill="none" stroke="url(#acc)" stroke-width="2.5" opacity="0.75"/>
</svg>
